<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản - Quản Lý Chi Tiêu cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        
        @keyframes glow-pulse-cyan {
            0%, 100% { text-shadow: 0 0 20px rgba(6, 182, 212, 0.5), 0 0 40px rgba(6, 182, 212, 0.3); }
            50% { text-shadow: 0 0 30px rgba(6, 182, 212, 0.8), 0 0 60px rgba(6, 182, 212, 0.5); }
        }
        
        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #1e293b, #0f172a);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
            color: #f8fafc !important;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, transparent 70%);
            animation: float 25s ease-in-out infinite;
            pointer-events: none;
        }

        .tech-card {
            background: rgba(30, 41, 59, 0.7) !important;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.15);
            will-change: transform, opacity;
            transform: translateZ(0);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .tech-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }
        
        .tech-card:hover {
            transform: translateY(-8px) translateZ(0);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.2),
                        0 0 0 1px rgba(6, 182, 212, 0.4);
        }

        .glow-text {
            color: #ffffff !important;
            animation: glow-pulse-cyan 3s ease-in-out infinite;
        }

        .tech-label {
            color: #cbd5e1 !important;
            font-size: 0.88rem;
            font-weight: 600;
        }

        .tech-input-group {
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.5) !important;
            transition: border-color 0.15s ease, box-shadow 0.15s ease !important;
            will-change: border-color, box-shadow;
        }
        .tech-input-group:focus-within {
            border-color: #00f5ff !important;
            box-shadow: 0 0 0 4px rgba(0, 245, 255, 0.15) !important;
        }

        .tech-input-text {
            background: transparent !important;
            border: none !important;
            color: #64748b !important;
            padding-left: 14px;
            padding-right: 8px;
        }

        .tech-form-control {
            background: transparent !important;
            border: none !important;
            color: #f8fafc !important;
            padding: 12px 14px 12px 4px;
            box-shadow: none !important;
        }
        .tech-form-control::placeholder {
            color: #475569 !important;
        }

        .btn-tech-cyan {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%) !important;
            color: #ffffff !important;
            border: none !important;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.4), 0 0 0 1px rgba(6, 182, 212, 0.2) !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            will-change: transform;
            transform: translateZ(0);
            position: relative;
            overflow: hidden;
            font-weight: 600;
        }
        
        .btn-tech-cyan::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn-tech-cyan:hover {
            background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%) !important;
            transform: translateY(-3px) translateZ(0);
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.6), 0 0 0 1px rgba(6, 182, 212, 0.4) !important;
        }
        
        .btn-tech-cyan:hover::before {
            left: 100%;
        }
        
        .btn-tech-cyan:active {
            transform: translateY(-1px) translateZ(0);
        }

        .tech-link {
            color: #06b6d4 !important;
            text-decoration: none;
            transition: color 0.15s linear !important;
        }
        .tech-link:hover {
            color: #22d3ee !important;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                
                <div class="card tech-card border-0 p-3 p-sm-4">
                    <div class="card-body">
                        
                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-white glow-text d-flex align-items-center justify-content-center gap-2">
                                <i class="bi bi-person-plus-fill text-info"></i> ĐĂNG KÝ MỚI
                            </h2>
                            <p class="small m-0 mt-1" style="color: #64748b;">Khởi tạo tài khoản giám sát chi tiêu cá nhân</p>
                        </div>
                        
                        <div th:if="${param.error}" class="alert alert-warning border-0 small text-center rounded-3 mb-4" 
                             style="background: rgba(245, 158, 11, 0.15); color: #fbbf24;">
                            <i class="bi bi-exclamation-circle-fill me-1"></i> Tên tài khoản đã tồn tại trên cơ sở dữ liệu!
                        </div>

                        <form th:action="@{/register}" method="POST" class="d-flex flex-column gap-3">
                            
                            <div class="mb-2">
                                <label class="form-label mb-1.5 tech-label">Tên tài khoản</label>
                                <div class="input-group tech-input-group">
                                    <span class="input-group-text tech-input-text"><i class="bi bi-person-badge"></i></span>
                                    <input type="text" name="username" class="form-control tech-form-control" placeholder="Nhập tên tài khoản..." required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label mb-1.5 tech-label">Mật khẩu</label>
                                <div class="input-group tech-input-group">
                                    <span class="input-group-text tech-input-text"><i class="bi bi-key-fill"></i></span>
                                    <input type="password" name="password" class="form-control tech-form-control" placeholder="Nhập mật khẩu an toàn..." required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-tech-cyan w-100 py-2.5 rounded-3 fw-bold mt-2">
                                <i class="bi bi-shield-check me-1"></i>Tạo Tài Khoản
                            </button>
                            
                            <div class="text-center mt-4 pt-2 border-top border-white border-opacity-5 small text-secondary">
                                <span style="color: #64748b;">Đã có tài khoản từ trước?</span> 
                                <a th:href="@{/login}" class="tech-link fw-semibold ms-1"><i class="bi bi-arrow-left small"></i> Quay lại Đăng nhập</a>
                            </div>

                        </form>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
