<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        /* Đồng bộ nền với trang đăng nhập */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        /* Hiệu ứng khi focus vào ô nhập */
        .form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 0.25rem rgba(79, 70, 229, 0.15);
        }
        .btn, .form-control {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                
                <div class="card border-0 shadow-lg rounded-4 bg-white">
                    <div class="card-body p-5">
                        
                        <div class="text-center mb-4">
                            <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 text-success rounded-circle p-3 mb-3">
                                <i class="bi bi-person-plus fs-3"></i>
                            </div>
                            <h3 class="fw-bold text-dark m-0">Tạo Tài Khoản</h3>
                            <p class="text-muted small mt-1">Đăng ký để trải nghiệm quản lý ví tiền thông minh</p>
                        </div>
                        
                        <div th:if="${error}" class="alert alert-danger d-flex align-items-center rounded-3 py-2 small" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <span th:text="${error}"></span>
                        </div>
                        
                        <div th:if="${message}" class="alert alert-success d-flex align-items-center rounded-3 py-2 small" role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            <span th:text="${message}"></span>
                        </div>
                        
                        <form th:action="@{/register}" method="post">
                            
                            <div class="mb-3">
                                <label class="form-label text-secondary small fw-semibold">Tên tài khoản</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                                    <input type="text" name="username" class="form-control bg-light border-start-0 rounded-end-3" placeholder="Tạo username của bạn" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label text-secondary small fw-semibold">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                                    <input type="password" name="password" class="form-control bg-light border-start-0 rounded-end-3" placeholder="Tối thiểu 6 ký tự" required>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-dark w-100 py-2-5 rounded-3 fw-bold shadow-sm mb-3">
                                Tạo tài khoản
                            </button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p class="small text-muted mb-0">Đã có tài khoản? 
                                <a th:href="@{/login}" class="text-primary fw-semibold text-decoration-none hover-underline">Đăng nhập ngay</a>
                            </p>
                        </div>
                        
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
