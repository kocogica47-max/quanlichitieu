<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Khoản Chi Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        /* Nền không gian tối đồng bộ trang chủ */
        body {
            background: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 100%);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        /* Thẻ kính mờ cao cấp (Glassmorphism) */
        .tech-card {
            background: rgba(30, 41, 59, 0.65) !important;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }

        /* Tiêu đề phát sáng nhẹ */
        .glow-text {
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        /* Định dạng lại các ô Form nhập liệu phong cách Cyber tối */
        .tech-input-group {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.4) !important;
            transition: all 0.25s ease;
        }
        .tech-input-group:focus-within {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        /* Icon đầu ô nhập liệu */
        .tech-input-text {
            background: transparent !important;
            border: none !important;
            color: #64748b !important;
            padding-left: 14px;
            padding-right: 8px;
        }

        /* Thanh Input viết chữ */
        .tech-form-control {
            background: transparent !important;
            border: none !important;
            color: #f8fafc !important; /* Chữ trắng rõ nét */
            padding: 12px 14px 12px 4px;
            box-shadow: none !important;
        }
        .tech-form-control::placeholder {
            color: #475569 !important;
        }
        /* Fix màu cho lịch trình picker (Date) */
        .tech-form-control::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
            cursor: pointer;
        }
        /* Mở rộng màu chữ cho thẻ select option */
        .tech-form-control option {
            background-color: #1e293b !important;
            color: #f8fafc;
        }

        /* Hệ thống nút bấm đồng bộ */
        .btn-tech-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.35);
            transition: all 0.2s ease;
        }
        .btn-tech-primary:hover {
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.5);
            color: white;
        }

        .btn-tech-outline {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #334155;
            transition: all 0.2s ease;
        }
        .btn-tech-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #f8fafc;
            border-color: #475569;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                
                <div class="card tech-card border-0 p-3 p-sm-4">
                    <div class="card-body">
                        
                        <div class="text-center mb-4">
                            <h3 class="fw-bold text-white glow-text d-flex align-items-center justify-content-center gap-2">
                                <i class="bi bi-node-plus text-info"></i> GHI KHOẢN CHI MỚI
                            </h3>
                            <p class="small m-0 mt-1" style="color: #64748b;">Khởi tạo bản ghi tiêu dùng vào cơ sở dữ liệu hệ thống</p>
                        </div>
                        
                        <form th:action="@{/saveExpense}" th:object="${expense}" method="POST" class="d-flex flex-column gap-3.5">
                            
                            <div class="mb-3">
                                <label class="form-label mb-1.5 fw-semibold" style="color: #94a3b8; font-size: 0.85rem; letter-spacing: 0.3px;">Nội dung chi tiêu</label>
                                <div class="input-group tech-input-group">
                                    <span class="input-group-text tech-input-text"><i class="bi bi-pencil-square"></i></span>
                                    <input type="text" th:field="*{title}" class
