<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Khoản Chi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        /* Nền gradient đồng bộ toàn hệ thống */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        /* Hiệu ứng khi bấm vào các ô điền dữ liệu */
        .form-control:focus, .form-select:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 0.25rem rgba(79, 70, 229, 0.15);
        }
        .btn-animate {
            transition: all 0.2s ease-in-out;
        }
        .btn-animate:hover {
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <div class="card border-0 shadow-lg rounded-4 bg-white">
                    <div class="card-body p-4 p-sm-5">
                        
                        <div class="d-flex align-items-center gap-3 mb-4">
                            <div class="bg-success bg-opacity-10 text-success rounded-3 p-2.5">
                                <i class="bi bi-plus-circle-fill fs-3"></i>
                            </div>
                            <div>
                                <h3 class="fw-bold text-dark m-0">Thêm Khoản Chi Mới</h3>
                                <p class="text-muted small m-0 mt-0.5">Điền chi tiết thông tin giao dịch để lưu vào hệ thống</p>
                            </div>
                        </div>
                        
                        <hr class="text-muted opacity-25 mb-4">
                        
                        <form th:action="@{/saveExpense}" th:object="${expense}" method="POST">
                            
                            <div class="mb-3">
                                <label class="form-label text-secondary small fw-semibold">Tên khoản chi</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-pencil-square"></i></span>
                                    <input type="text" th:field="*{title}" class="form-control bg-light border-start-0 rounded-end-3" placeholder="Ví dụ: Tiền phòng, ăn trưa..." required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-secondary small fw-semibold">Số tiền (VND)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-currency-dollar"></i></span>
                                    <input type="number" th:field="*{amount}" class="form-control bg-light border-start-0 rounded-end-3" placeholder="Nhập số tiền..." required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-secondary small fw-semibold">Danh mục chi tiêu</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-tags"></i></span>
                                    <select th:field="*{category}" class="form-select bg-light border-start-0 rounded-end-3">
                                        <option value="Ăn uống">🛒 Ăn uống</option>
                                        <option value="Di chuyển">🚗 Di chuyển</option>
                                        <option value="Nhà ở">🏠 Nhà ở</option>
                                        <option value="Giải trí">🎬 Giải trí</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-secondary small fw-semibold">Ngày chi</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-calendar-event"></i></span>
                                    <input type="date" th:field="*{date}" class="form-control bg-light border-start-0 rounded-end-3" required>
                                </div>
                            </div>

                            <div class="row g-2 pt-2">
                                <div class="col-8 col-sm-9">
                                    <button type="submit" class="btn btn-dark w-100 py-2-5 rounded-3 fw-bold shadow-sm btn-animate">
                                        <i class="bi bi-check-lg me-1"></i> Lưu lại
                                    </button>
                                </div>
                                <div class="col-4 col-sm-3">
                                    <a th:href="@{/}" class="btn btn-outline-secondary w-100 py-2-5 rounded-3 fw-semibold btn-animate">
                                        Hủy
                                    </a>
                                </div>
                            </div>
                            
                        </form>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
