<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Khoản Chi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="col-md-6 offset-md-3">
        <h2>Thêm Khoản Chi Mới</h2>
        <hr>
        <form action="#" th:action="@{/saveExpense}" th:object="${expense}" method="POST">
            
            <div class="mb-3">
                <label class="form-label">Tên khoản chi:</label>
                <input type="text" th:field="*{title}" class="form-control" placeholder="Ví dụ: Tiền phòng, ăn trưa..." required>
            </div>

            <div class="mb-3">
                <label class="form-label">Số tiền:</label>
                <input type="number" th:field="*{amount}" class="form-control" placeholder="Nhập số tiền..." required>
            </div>

            <div class="mb-3">
                <label class="form-label">Danh mục:</label>
                <select th:field="*{category}" class="form-control">
                    <option value="Ăn uống">Ăn uống</option>
                    <option value="Di chuyển">Di chuyển</option>
                    <option value="Nhà ở">Nhà ở</option>
                    <option value="Giải trí">Giải trí</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Ngày chi:</label>
                <input type="date" th:field="*{date}" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success">Lưu lại</button>
            <a th:href="@{/}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>
</body>
</html>
