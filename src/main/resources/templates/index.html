<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý chi tiêu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 100%);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Tối ưu hóa render lớp kính mờ bằng GPU để đạt 120 FPS */
        .tech-card {
            background: rgba(30, 41, 59, 0.65) !important;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
            will-change: transform, opacity;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .table-container {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(15, 23, 42, 0.2);
        }

        /* Nút bấm chuyển động mượt với thuật toán Bezier */
        .btn-animate {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
            will-change: transform;
            transform: translateZ(0);
        }
        .btn-animate:hover {
            transform: translateY(-2px) translateZ(0);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
        .btn-animate:active {
            transform: translateY(0) translateZ(0);
        }

        .table-tech {
            --bs-table-bg: transparent !important;
            color: #f8fafc !important;
            margin-bottom: 0;
            vertical-align: middle;
        }
        .table-tech th {
            background: rgba(15, 23, 42, 0.6) !important;
            color: #94a3b8 !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.8px;
            padding: 14px 16px !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
        }
        .table-tech td {
            padding: 16px !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04) !important;
            background: transparent !important;
        }
        
        .table-tech tr {
            transition: background-color 0.15s linear;
        }
        .table-tech tr:hover {
            background-color: rgba(255, 255, 255, 0.02) !important;
        }

        /* Tối ưu hóa vùng chứa Chart tránh giật khung hình */
        .chart-box {
            position: relative;
            width: 100%;
            height: 220px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3 mb-5">
            <div>
                <h1 class="fw-bold m-0 glow-text text-white d-flex align-items-center gap-2.5" style="font-size: 1.85rem;">
                    <i class="bi bi-wallet2 text-info"></i> VÍ ĐIỆN TỬ
                </h1>
                <p class="m-0 mt-1 small" style="color: #64748b;">
                    Xin chào quản trị viên: <span class="text-info fw-semibold" th:text="${username}">User</span>
                </p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/showNewExpenseForm}" class="btn btn-primary btn-animate px-4 py-2.5 rounded-3 fw-bold border-0" 
                   style="background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);">
                    <i class="bi bi-plus-circle-fill me-1.5"></i> Thêm Khoản Chi
                </a>
                <a th:href="@{/logout}" class="btn btn-animate px-3 py-2.5 rounded-3 border-0 fw-semibold" 
                   style="background: rgba(255, 255, 255, 0.05); color: #cbd5e1;">
                    <i class="bi bi-box-arrow-right"></i>
                </a>
            </div>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-12 col-md-5">
                <div class="card tech-card h-100 border-0 p-3">
                    <div class="card-body d-flex flex-column justify-content-between">
                        <div>
                            <span class="text-uppercase fw-bold" style="color: #94a3b8; font-size: 0.75rem; letter-spacing: 1px;">Tổng chi tiêu</span>
                            <h2 class="fw-extrabold my-2 text-white" style="font-size: 2.2rem; letter-spacing: -0.5px;" 
                                th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</h2>
                        </div>
                        <div id="xuHuongContainer" class="mt-4">
                            <span class="text-secondary small">Đang đối soát dữ liệu tháng...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-7">
                <div class="card tech-card border-0 p-3">
                    <div class="card-body">
                        <span class="text-uppercase fw-bold d-block mb-3" style="color: #94a3b8; font-size: 0.75rem; letter-spacing: 1px;">Biểu đồ thống kê chi tiêu</span>
                        <div class="chart-box">
                            <canvas id="fintechChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card tech-card border-0 p-3">
            <div class="card-body">
                <h5 class="fw-bold mb-4 text-white d-flex align-items-center gap-2" style="font-size: 1.05rem;">
                    <i class="bi bi-clock-history text-info"></i> Nhật ký giao dịch
                </h5>
                
                <div class="table-container">
                    <table class="table table-tech text-nowrap">
                        <thead>
                            <tr>
                                <th class="ps-4">Nội dung chi tiêu</th>
                                <th>Danh mục</th>
                                <th>Số tiền</th>
                                <th>Ngày giao dịch</th>
                                <th class="text-end pe-4">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(listExpenses)}">
                                <td colspan="5" class="text-center py-5" style="color: #475569;">
                                    <i class="bi bi-inbox d-block display-6 mb-2 text-muted"></i>
                                    Chưa có bản ghi chi tiêu nào trong chu kỳ này.
                                </td>
                            </tr>
                            <tr th:each=\"expense : ${listExpenses}\">
                                <td class="ps-4 fw-semibold text-white" th:text="${expense.title}"></td>
                                <td>
                                    <span class="badge px-3 py-2 rounded-pill fw-medium" 
                                          style="background: rgba(255,255,255,0.05); color: #cbd5e1; border: 1px solid rgba(255,255,255,0.05);"
                                          th:text="${expense.category}"></span>
                                </td>
                                <td class="fw-bold" style="color: #f87171;" 
                                    th:text="${#numbers.formatDecimal(expense.amount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                                <td style="color: #94a3b8;" th:text="${expense.date}"></td>
                                <td class="text-end pe-4">
                                    <a th:href="@{/deleteExpense/{id}(id=${expense.id})}" 
                                       class="btn btn-outline-danger btn-sm border-0 rounded-3 px-3 py-1.5 btn-animate fw-medium"
                                       style="background: rgba(239, 68, 68, 0.1); color: #f87171;"
                                       onclick="return confirm('Xác nhận xóa bản ghi chi tiêu này khỏi Cloud?')">
                                        <i class="bi bi-trash3 me-1"></i> Xóa
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetch('/api/xu-huong-chi-tieu')
                .then(res => res.json())
                .then(data => {
                    const textDiv = document.getElementById("xuHuongContainer");
                    let danhGiaXuHuong = "";
                    
                    if (data.phanTramThayDoi > 0) {
                        danhGiaXuHuong = `<span style="color: #f87171; font-weight: 700;"><i class="bi bi-lightning-fill me-1"></i>Vượt hạn mức ${data.phanTramThayDoi}%</span>`;
                    } else if (data.phanTramThayDoi < 0) {
                        danhGiaXuHuong = `<span style="color: #34d399; font-weight: 700;"><i class="bi bi-shield-check me-1"></i>Tiết kiệm ${Math.abs(data.phanTramThayDoi)}%</span>`;
                    } else {
                        danhGiaXuHuong = `<span class="text-info fw-bold">Chi tiêu tối ưu ổn định</span>`;
                    }

                    textDiv.innerHTML = `
                        <div class="mb-1.5 text-secondary" style="font-size: 0.85rem;">Chu kỳ trước: <span class="text-white fw-bold ms-1">${data.tongThangTruoc.toLocaleString('vi-VN')} ₫</span></div>
                        <div class="mb-3 text-secondary" style="font-size: 0.85rem;">Chu kỳ này: <span class="text-white fw-bold ms-1">${data.tongThangNay.toLocaleString('vi-VN')} ₫</span></div>
                        <div class="p-2 px-3 rounded-3 border-start border-3 ${data.phanTramThayDoi > 0 ? 'border-danger' : 'border-success'}" style="background: rgba(255,255,255,0.02); font-size: 0.88rem; display: inline-block;">
                            ${danhGiaXuHuong}
                        </div>
                    `;

                    // Tối ưu hóa cấu hình đồ thị bằng bộ nhớ đệm
                    const ctx = document.getElementById('fintechChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: [data.labelThangTruoc, data.labelThangNay],
                            datasets: [{
                                label: 'Chi phí giao dịch',
                                data: [data.tongThangTruoc, data.tongThangNay],
                                backgroundColor: ['rgba(99, 102, 241, 0.25)', 'rgba(6, 182, 212, 0.35)'],
                                borderColor: ['#6366f1', '#06b6d4'],
                                borderWidth: 2,
                                borderRadius: 8,
                                borderSkipped: false
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            animation: { duration: 400, easing: 'easeOutQuart' }, // Giảm thời gian vẽ để tăng mượt FPS
                            plugins: { legend: { display: false } },
                            scales: {
                                x: { grid: { display: false }, ticks: { color: '#64748b' } },
                                y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#64748b' } }
                            }
                        }
                    });
                })
                .catch(err => console.error("Lỗi dữ liệu đồ thị:", err));
        });
    </script>
</body>
</html>
