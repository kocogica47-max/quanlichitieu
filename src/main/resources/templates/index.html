<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý chi tiêu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .table-container {
            border-radius: 12px;
            overflow: hidden;
        }
        .table th {
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        .table td {
            font-size: 0.95rem;
        }
        .btn-animate {
            transition: all 0.2s ease-in-out;
        }
        .btn-animate:hover {
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="py-5">
    <div class="container">
        
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3 mb-4">
            <div>
                <h2 class="fw-bold text-dark m-0 d-flex align-items-center gap-2">
                    <i class="bi bi-wallet2 text-primary"></i> Nhật Ký Chi Tiêu
                </h2>
                <p class="text-muted small m-0 mt-1">Theo dõi và tối ưu hóa các khoản chi tiêu cá nhân của bạn</p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/showNewExpenseForm}" class="btn btn-primary btn-animate fw-semibold rounded-3 px-4 shadow-sm">
                    <i class="bi bi-plus-circle me-1"></i> Thêm Khoản Chi
                </a>
                <a th:href="@{/logout}" class="btn btn-outline-secondary btn-animate fw-semibold rounded-3 px-3 shadow-sm">
                    <i class="bi bi-box-arrow-right me-1"></i> Đăng xuất
                </a>
            </div>
        </div>
        
        <div class="card border-0 shadow-sm rounded-4 mb-4 bg-white">
            <div class="card-body p-4">
                <h5 class="card-title fw-bold text-dark mb-4">
                    <i class="bi bi-bar-chart-line-fill me-2 text-primary"></i>Báo cáo so sánh chi tiêu
                </h5>
                <div class="row align-items-center">
                    <div class="col-md-5 col-12 mb-4 mb-md-0">
                        <div style="position: relative; height: 180px; width: 100%;">
                            <canvas id="chartSoSanhThang"></canvas>
                        </div>
                    </div>
                    <div class="col-md-7 col-12">
                        <div id="textPhanTichThongKe" class="fs-6 text-secondary">
                            <p class="placeholder-glow"><span class="placeholder col-6"></span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card border-0 border-start border-primary border-4 shadow-sm rounded-3 p-4 mb-4 bg-white">
            <div class="d-flex align-items-center gap-3">
                <div class="bg-primary bg-opacity-10 text-primary rounded-3 p-3">
                    <i class="bi bi-cash-coin fs-3"></i>
                </div>
                <div>
                    <h5 class="text-secondary small text-uppercase fw-bold m-0 mb-1">Tổng chi tiêu tháng này</h5>
                    <h2 class="text-primary fw-extrabold m-0" th:text="${totalAmount} + ' VND'">0 VND</h2>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 bg-white p-2">
            <div class="card-body p-0">
                <div class="table-responsive table-container">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light border-bottom text-secondary">
                            <tr>
                                <th class="ps-4 py-3">Nội dung</th>
                                <th class="py-3">Danh mục</th>
                                <th class="py-3">Số tiền</th>
                                <th class="py-3">Ngày chi</th>
                                <th class="text-end pe-4 py-3">Hành động</th>
                            </tr>
                        </thead>
                        <tbody class="border-top-0">
                            <tr th:if="${#lists.isEmpty(listExpenses)}">
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                    Chưa có khoản chi tiêu nào được ghi nhận.
                                </td>
                            </tr>
                            
                            <tr th:each="expense : ${listExpenses}">
                                <td class="ps-4 fw-medium text-dark" th:text="${expense.title}"></td>
                                <td>
                                    <span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-20 px-2.5 py-1.5 rounded-pill" th:text="${expense.category}"></span>
                                </td>
                                <td class="fw-bold text-danger-emphasis" th:text="${expense.amount} + ' ₫'"></td>
                                <td class="text-muted" th:text="${expense.date}"></td>
                                <td class="text-end pe-4">
                                    <a th:href="@{/deleteExpense/{id}(id=${expense.id})}" 
                                       class="btn btn-outline-danger btn-sm border-0 rounded-3 px-2.5 py-1.5 btn-animate"
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa khoản chi này không?')">
                                        <i class="bi bi-trash3 me-1"></i> Xóa
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
    </div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        fetch('/api/thong-ke/so-sanh-thang')
            .then(response => response.json())
            .then(data => {
                if(data.error) return;

                const ctx = document.getElementById('chartSoSanhThang').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: [data.labelThangTruoc, data.labelThangNay],
                        datasets: [{
                            label: 'Số tiền (₫)',
                            data: [data.tongThangTruoc, data.tongThangNay],
                            backgroundColor: ['#adb5bd', '#4f46e5'],
                            borderRadius: 6,
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } }
                    }
                });

                const textDiv = document.getElementById('textPhanTichThongKe');
                let danhGiaXuHuong = "";

                if (data.phanTramThayDoi > 0) {
                    danhGiaXuHuong = `<span class="text-danger fw-bold"><i class="bi bi-graph-up-arrow me-1"></i>Tăng ${data.phanTramThayDoi}%</span> so với tháng trước. Bạn nên cân đối lại ví tiền nhé!`;
                } else if (data.phanTramThayDoi < 0) {
                    danhGiaXuHuong = `<span class="text-success fw-bold"><i class="bi bi-graph-down-arrow me-1"></i>Giảm ${Math.abs(data.phanTramThayDoi)}%</span> so với tháng trước. Chi tiêu rất kế hoạch!`;
                } else {
                    danhGiaXuHuong = `Chi tiêu giữ mức ổn định bằng khít so với tháng trước.`;
                }

                textDiv.innerHTML = `
                    <div class="mb-2">Tổng chi tháng trước: <strong class="text-dark">${data.tongThangTruoc.toLocaleString('vi-VN')} ₫</strong></div>
                    <div class="mb-2">Tổng chi tháng này: <strong class="text-dark">${data.tongThangNay.toLocaleString('vi-VN')} ₫</strong></div>
                    <div class="p-2 bg-light rounded-3 mt-3 border-start border-4 ${data.phanTramThayDoi > 0 ? 'border-danger' : 'border-success'}">
                        ${danhGiaXuHuong}
                    </div>
                `;
            })
            .catch(err => {
                document.getElementById('textPhanTichThongKe').innerHTML = "<span class='text-danger'>Lỗi tải dữ liệu thống kê rồi!</span>";
                console.error(err);
            });
    });
</script>
</body>
</html>
