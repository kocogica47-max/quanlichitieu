<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{app.title}">Quản lý chi tiêu cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 100%) !important;
            color: #f8fafc !important;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        
        /* FIX LỖI -webkit-background-clip: Tách biệt class CSS chống crash khi biên dịch */
        .brand-title {
            font-weight: bold;
            margin-bottom: 0;
            display: flex;
            align-items: center;
            background: linear-gradient(to right, #22d3ee, #818cf8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: #22d3ee; /* Màu dự phòng */
        }

        .tech-card {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
        }
        .table-cyber {
            --bs-table-bg: transparent;
            --bs-table-color: #f8fafc;
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        .table-cyber tr {
            background: rgba(30, 41, 59, 0.3);
        }
        .table-cyber th {
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
        }
        .table-cyber td {
            padding: 14px;
            vertical-align: middle;
        }
        .btn-gradient-cyan {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            border: none;
            color: white !important;
            border-radius: 10px;
            padding: 10px 20px;
        }
        .badge-category {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
        }
        
        /* CSS Tối ưu hóa hiển thị riêng biệt trên màn hình Điện thoại */
        @media (max-width: 767.98px) {
            .mobile-card-item {
                background: rgba(30, 41, 59, 0.3);
                border: 1px solid rgba(255, 255, 255, 0.05);
                border-radius: 12px;
                padding: 14px;
                margin-bottom: 10px;
            }
            .btn-gradient-cyan {
                padding: 8px 14px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body class="py-3 py-md-5">
    <div class="container">
        
        <div class="d-flex justify-content-between align-items-center gap-2 mb-4 mb-md-5 pb-3 border-bottom border-secondary border-opacity-25">
            <h2 class="brand-title fs-4 fs-md-2">
                <i class="bi bi-cpu me-2 me-md-3" style="color: #06b6d4; -webkit-text-fill-color: initial;"></i>
                <span th:text="#{app.title}">Quản lý chi tiêu</span>
            </h2>
            
            <div class="d-flex align-items-center gap-2">
                <div class="bg-dark bg-opacity-25 p-2 px-2 px-md-3 rounded-3 border border-secondary border-opacity-10">
                    <span class="small text-secondary" style="font-size: 0.85rem;">
                        <i class="bi bi-person-circle me-1" style="color: #06b6d4;"></i>
                        <span class="d-none d-md-inline" th:text="#{app.welcome} + ': '">Chào, </span>
                        <span class="fw-medium text-white-50" th:text="${username}">User</span>
                    </span>
                </div>
                <a href="/logout" class="btn btn-sm btn-outline-danger px-2 px-md-3 rounded-3 d-flex align-items-center gap-1" style="padding-top: 6px; padding-bottom: 6px;">
                    <i class="bi bi-box-arrow-right"></i> 
                    <span class="d-none d-md-inline" th:text="#{app.btn.delete}">Đăng xuất</span>
                </a>
            </div>
        </div>

        <div class="row g-3 g-md-4">
            <div class="col-lg-4">
                <div class="tech-card p-3 p-md-4 mb-3 mb-md-4">
                    <div class="d-flex align-items-center">
                        <div class="p-2 p-md-3 rounded-3 bg-info bg-opacity-10 me-3" style="color: #06b6d4;">
                            <i class="bi bi-wallet2 fs-4"></i>
                        </div>
                        <div>
                            <p class="text-secondary small mb-1" th:text="#{app.total}">Tổng tích lũy chi</p>
                            <h3 class="fw-bold mb-0 fs-4 fs-md-3" style="color: #06b6d4;" th:text="${totalAmount != null ? #numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT') + ' đ' : '0 đ'}">0 đ</h3>
                        </div>
                    </div>
                </div>

                <div class="tech-card p-3 p-md-4 mb-3 mb-md-0">
                    <h6 class="fw-bold mb-3 mb-md-4" style="color: #818cf8;"><i class="bi bi-graph-up-arrow me-2"></i><span th:text="#{app.chart.title}">Xu hướng</span></h6>
                    <div style="position: relative; height: 180px; width: 100%;">
                        <canvas id="xuHuongChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="tech-card p-3 p-md-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-3 mb-md-4">
                        <h6 class="fw-bold mb-0 text-white-50"><i class="bi bi-list-stars me-2" style="color: #06b6d4;"></i><span th:text="#{app.history}">Lịch sử giao dịch</span></h6>
                        <a href="/showNewExpenseForm" class="btn btn-gradient-cyan d-flex align-items-center gap-2">
                            <i class="bi bi-plus-lg"></i> 
                            <span th:text="#{app.btn.add}">Thêm khoản chi</span>
                        </a>
                    </div>

                    <div class="d-block d-md-none">
                        <div th:each="expense : ${listExpenses}" class="mobile-card-item">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div>
                                    <div class="fw-bold text-white fs-6" th:text="${expense.title}">Khoản chi</div>
                                    <div class="text-secondary" style="font-size: 0.75rem;" th:text="${expense.date}">01-01-2026</div>
                                </div>
                                <div class="text-end">
                                    <div class="fw-bold" style="color: #06b6d4; font-size: 1.05rem;" th:text="${#numbers.formatDecimal(expense.amount, 0, 'COMMA', 0, 'POINT') + ' đ'}">0 đ</div>
                                    <div class="mt-1"><span class="badge badge-category" th:text="${expense.category}">Danh mục</span></div>
                                </div>
                            </div>
                            <div class="d-flex justify-content-end border-top border-secondary border-opacity-10 pt-2 mt-2">
                                <a th:href="@{/deleteExpense/{id}(id=${expense.id})}" 
                                   class="text-danger bg-danger bg-opacity-10 p-2 py-1 rounded-2 text-decoration-none" style="font-size: 0.85rem;"
                                   th:data-confirm-msg="#{app.confirm.delete}" 
                                   onclick="return confirm(this.getAttribute('data-confirm-msg'))">
                                    <i class="bi bi-trash3 me-1"></i> Xóa bản ghi
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive d-none d-md-block">
                        <table class="table table-cyber mb-0">
                            <thead>
                                <tr>
                                    <th th:text="#{app.th.title}">Khoản chi</th>
                                    <th th:text="#{app.th.category}">Danh mục</th>
                                    <th th:text="#{app.th.date}">Thời gian</th>
                                    <th class="text-end" th:text="#{app.th.amount}">Số tiền</th>
                                    <th class="text-center" th:text="#{app.th.action}">Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="expense : ${listExpenses}">
                                    <td class="fw-medium text-white" th:text="${expense.title}">Khoản chi</td>
                                    <td><span class="badge badge-category" th:text="${expense.category}">Danh mục</span></td>
                                    <td class="text-secondary small" th:text="${expense.date}">01-01-2026</td>
                                    <td class="text-end fw-bold" style="color: #06b6d4;" th:text="${#numbers.formatDecimal(expense.amount, 0, 'COMMA', 0, 'POINT') + ' đ'}">0 đ</td>
                                    <td class="text-center">
                                        <a th:href="@{/deleteExpense/{id}(id=${expense.id})}" 
                                           class="btn btn-sm btn-outline-danger border-0" 
                                           th:data-confirm-msg="#{app.confirm.delete}" 
                                           onclick="return confirm(this.getAttribute('data-confirm-msg'))">
                                            <i class="bi bi-trash3"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div th:if="${#lists.isEmpty(listExpenses)}" class="text-center py-5 text-secondary">
                        <i class="bi bi-inbox fs-2 mb-2 d-block text-secondary border-opacity-25"></i>
                        <span th:text="#{app.table.empty}">Chưa có dữ liệu chi tiêu nào được ghi nhận.</span>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            fetch('/api/xu-huong-chi-tieu')
                .then(response => response.json())
                .then(data => {
                    const ctx = document.getElementById('xuHuongChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: [data.labelThangTruoc, data.labelThangNay],
                            datasets: [{
                                label: 'Cost',
                                data: [data.tongThangTruoc || 0, data.tongThangNay || 0],
                                backgroundColor: ['rgba(99, 102, 241, 0.25)', 'rgba(6, 182, 212, 0.35)'],
                                borderColor: ['#6366f1', '#06b6d4'],
                                borderWidth: 2,
                                borderRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } }
                        }
                    });
                })
                .catch(err => console.error("Error loading chart data:", err));
        });
    </script>
</body>
</html>
