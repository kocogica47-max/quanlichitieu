<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý chi tiêu</title>
    <!--Nhúng Bootstrap để giao diện đẹp luôn không cần CSS nhiều-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📊 Nhật Ký Chi Tiêu Cá Nhân</h2>
        <a th:href="@{/showNewExpenseForm}" class="btn btn-primary">➕ Thêm Khoản Chi</a>
    </div>
    
    <!--Hiển thị tổng tiền-->
    <div class="alert alert-info">
        <h4>Tổng chi tiêu: <span th:text="${totalAmount} + ' VND'">0 VND</span></h4>
    </div>

    <!--Bảng danh sách-->
    <table class="table table-striped table-bordered">
         <thead class="table-dark">
            <tr>
                <th>Nội dung</th>
                <th>Danh mục</th>
                <th>Số tiền(VND)</th>
                <th>Ngày chi</th>
                <th>Hành động</th>
            </tr>
        </thead>
       <tbody>
    <tr th:each="expense : ${listExpenses}">
        <td th:text="${expense.title}"></td>
        <td th:text="${expense.category}"></td>
        <td th:text="${expense.amount}"></td>
        <td th:text="${expense.date}"></td>
        <td>
            <a th:href="@{/deleteExpense/{id}(id=${expense.id})}" class="btn btn-danger btn-sm">Xóa</a>
        </td>
    </tr>
</tbody>
    </table>
</body>
</html>
