<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{app.title}">Quản lý chi tiêu cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 100%) !important;
            color: #f8fafc !important;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        .tech-card {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
        }
        .table-cyber {
            --bs-table-bg: transparent;
            --bs-table-color: #f8fafc;
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        .table-cyber tr {
            background: rgba(30, 41, 59, 0.3);
        }
        .table-cyber th {
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
        }
        .table-cyber td {
            padding: 16px;
            vertical-align: middle;
        }
        .btn-gradient-cyan {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            border: none;
            color: white !important;
            border-radius: 10px;
            padding: 10px 20px;
        }
        .badge-category {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 6px 12px;
            border-radius: 8px;
        }
    </style>
</head>
<body class="py-4 py-md-5">
    <div class="container">
        
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 mb-5 pb-3 border-bottom border-secondary border-opacity-25">
            <h2 class="fw-bold mb-0 d-flex align-items-center" style="background: linear-gradient(to right, #22d3ee, #818cf8); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                <i class="bi bi-cpu me-3" style="color: #06b6d4;"></i>
                <span th:text="#{app.title}">Quản lý chi tiêu</span>
            </h2>
            
            <div class="d-flex align-items-center gap-3">
                <div class="bg-dark bg-opacity-25 p-2 px-3 rounded-3 border border-secondary border-opacity-10">
                    <span class="small text-secondary">
                        <i class="bi bi-person-circle me-1" style="color: #06b6d4;"></i>
                        <span th:text="#{app.welcome} + ': ' + ${username}">User</span>
                    </span>
                </div>
                <a href="/logout" class="btn btn-sm btn-outline-danger px-3 rounded-3">
                    <i class="bi bi-box-arrow-right me-1"></i> 
                    <span th:text="#{app.btn.delete}">Đăng xuất</span>
                </a>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="tech-card p-4 mb-4">
                    <div class="d-flex align-items-center">
                        <div class="p-3 rounded-3 bg-info bg-opacity-10 me-3" style="color: #06b6d4;">
                            <i class="bi bi-wallet2 fs-4"></i>
                        </div>
                        <div>
                            <p class="text-secondary small mb-1" th:text="#{app.total}">Tổng tích lũy chi</p>
                            <h3 class="fw-bold mb-0" style="color: #06b6d4;" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</h3>
                        </div>
                    </div>
                </div>

                <div class="tech-card p-4">
                    <h5 class="fw-bold mb-4" style="color: #818cf8;"><i class="bi bi-graph-up-arrow me-2"></i><span th:text="#{app.chart.title}">Xu hướng</span></h5>
                    <div style="position: relative; height: 220px; width: 100%;">
                        <canvas id="xuHuongChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="tech-card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold mb-0"><i class="bi bi-list-stars me-2" style="color: #06b6d4;"></i><span th:text="#{app.history}">Lịch sử giao dịch</span></h5>
                        <a href="/showNewExpenseForm" class="btn btn-gradient-cyan opacity-100-hover d-flex align-items-center gap-2">
                            <i class="bi bi-plus-lg"></i> 
                            <span th:text="#{app.btn.add}">Thêm khoản chi</span>
                        </a>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-cyber mb-0" style="min-width: 550px;">
                            <thead>
                                <tr>
                                    <th th:text="#{app.th.title}">Khoản chi</th>
                                    <th th:text="#{app.th.category}">Danh mục</th>
                                    <th th:text="#{app.th.date}">Thời gian</th>
                                    <th class="text-end" th:text="#{app.th.amount}">Số tiền</th>
                                    <th class="text-center" th:text="#{app.th.action}">Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="expense : ${listExpenses}" th:if="${listExpenses != null}">
                                    <td class="fw-medium text-white" th:text="${expense.title}">Khoản chi</td>
                                    <td><span class="badge badge-category" th:text="${expense.category}">Danh mục</span></td>
                                    <td class="text-secondary small" th:text="${expense.date}">01-01-2026</td>
                                    <td class="text-end fw-bold" style="color: #06b6d4;" th:text="${#numbers.formatDecimal(expense.amount, 0, 'COMMA', 0, 'POINT') + ' đ'}">0 đ</td>
                                    <td class="text-center">
                                        <a th:href="@{/deleteExpense/{id}(id=${expense.id})}" 
                                           class="btn btn-sm btn-outline-danger border-0" 
                                           th:data-confirm-msg="#{app.confirm.delete}" 
                                           onclick="return confirm(this.getAttribute('data-confirm-msg'))">
                                            <i class="bi bi-trash3"></i>
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(listExpenses)}">
                                    <td colspan="5" class="text-center py-5 text-secondary">
                                        <span th:text="#{app.table.empty}">Chưa có dữ liệu chi tiêu nào được ghi nhận.</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            fetch('/api/xu-huong-chi-tieu')
                .then(response => response.json())
                .then(data => {
                    const ctx = document.getElementById('xuHuongChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: [data.labelThangTruoc, data.labelThangNay],
                            datasets: [{
                                label: 'Cost',
                                data: [data.tongThangTruoc || 0, data.tongThangNay || 0],
                                backgroundColor: ['rgba(99, 102, 241, 0.25)', 'rgba(6, 182, 212, 0.35)'],
                                borderColor: ['#6366f1', '#06b6d4'],
                                borderWidth: 2,
                                borderRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } }
                        }
                    });
                })
                .catch(err => console.error("Error loading chart data:", err));
        });
    </script>
</body>
</html>
